name = "tag-searcher"
main = "src/index.ts"
compatibility_date = "2024-09-23"

# KV для хранения «ловушек».
[[kv_namespaces]]
binding = "TRAPS"
id = "a848abd92dd64ce8ab1de6f850586e27"

# Durable Object — движок автопоиска. Каждая сессия поиска живёт в своём объекте
# и будит себя alarm'ом каждый круг (надёжно, с ретраями, без лимита 32 вызовов).
[[durable_objects.bindings]]
name = "SEARCH"
class_name = "SearchSession"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["SearchSession"]

# Cron: проверяем ловушки каждые 2 минуты
[triggers]
crons = ["*/2 * * * *"]

# Секреты (не хранить в файле!):
#   wrangler secret put BOT_TOKEN
#   wrangler secret put WEBHOOK_SECRET
